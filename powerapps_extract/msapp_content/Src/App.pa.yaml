App:
  Properties:
    OnStart: |-
      =Concurrent(
          Set(
              varCorPrincipal,
              RGBA(
                  201,
                  80,
                  37,
                  1
              )
          ),
          Set(
              varCorPrincipalTranslucida,
              RGBA(
                  201,
                  80,
                  37,
                  0.3
              )
          ),
          Set(
              varCorComponente,
              RGBA(
                  102,
                  101,
                  101,
                  1
              )
          ),
          Set(
              varCorComponenteTraslucida,
              RGBA(
                  102,
                  101,
                  101,
                  0.3
              )
      )
      );
      Set(
          varAcesso,
          User().FullName
      )
    Theme: =PowerAppsTheme

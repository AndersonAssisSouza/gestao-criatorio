      - Button1_5:
          Control: Classic/Button@2.2.0
          Group: GestaoOvos
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            DisabledColor: =Color.White
            DisabledFill: =varCorComponenteTraslucida
            DisplayMode: |-
              =If(
                  And(
                      VarOvoSelecionado.DataInicioChoco = Text(DatePicker2.SelectedDate),
                      VarOvoSelecionado.Status = Dropdown3.Selected.Value
                  ),
                  DisplayMode.Disabled,
                  And(
                      Dropdown3.Selected.Value = "Nasceu",
                      IsBlank(DatePicker2.SelectedDate)
                  ) = true,
                  DisplayMode.Disabled,
                  And(
                      Dropdown3.Selected.Value = "Descartado",
                      IsBlank(DatePicker2.SelectedDate)
                  ) = true,
                  DisplayMode.Disabled,
                  And(
                      Dropdown3.Selected.Value = "Fertilizado",
                      IsBlank(DatePicker2.SelectedDate)
                  ) = true,
                  DisplayMode.Disabled,
                  And(
                      Dropdown3.Selected.Value = "Chocando",
                      IsBlank(DatePicker2.SelectedDate)
                  ) = true,
                  DisplayMode.Disabled,
                  DisplayMode.Edit
              )
            Fill: =varCorPrincipal
            Font: =Font.'Open Sans'
            Height: =53
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =Color.Green
            OnSelect: |
              =If(
                  Dropdown3.Selected.Value = "Descartado",
                  Patch(
                      Ovos,
                      VarOvoSelecionado,
                      {
                          Status: Dropdown3.Selected.Value,
                          DataDescarte: DatePicker2.SelectedDate
                      }
                  )
              );
              If(
                  And(
                      VarOvoSelecionado.Status = "Postura",
                      Dropdown3.Selected.Value = "Chocando"
                  ),
                  Patch(
                      Ovos,
                      VarOvoSelecionado,
                      {
                          Status: Dropdown3.Selected.Value,
                          DataInicioChoco: Text(DatePicker2.SelectedDate),
                          ConfirmaInicioChoco: "Sim",
                          DataNascimento: DatePicker1.SelectedDate + Value(
                              LookUp(
                                  EspecieAve,
                                  Especie = LookUp(
                                      Plantel,
                                      ID = Value(varpaiselecionado.ID),
                                      CategoriaAve
                                  ),
                                  TempoChoco
                              )
                          )
                      }
                  )
              );
              If(
                  And(
                      VarOvoSelecionado.Status = "Chocando",
                      Dropdown3.Selected.Value = "Fertilizado"
                  ),
                  Patch(
                      Ovos,
                      VarOvoSelecionado,
                      {
                          Status: Dropdown3.Selected.Value,
                          DataConfirmacaoFetilizacao: DatePicker2.SelectedDate
                      }
                  )
              );
              If(
                  And(
                      VarOvoSelecionado.Status = "Fertilizado",
                      Dropdown3.Selected.Value = "Nasceu"
                  ),
                  Concurrent(
                      Patch(
                          Ovos,
                          VarOvoSelecionado,
                          {
                              Status: Dropdown3.Selected.Value,
                              DataNascimento: DatePicker2.SelectedDate
                          }
                      ),
                      Patch(
                          Filhotes,
                          Defaults(Filhotes),
                          {
                              IDMãe: {
                                  Id: varmaeselecionada.ID,
                                  Value: ""
                              },
                              IDPai: {
                                  Id: varpaiselecionado.ID,
                                  Value: ""
                              },
                              Gaiola: VarChocandoSelecionada.NumeroGaiola,
                              Status: "Vivo",
                              NumeroOvo: Label4_10.Text,
                              DataNascimento: DatePicker2.SelectedDate,
                              DataPrevistaAnilhamento: DateAdd(
                                  DatePicker2.SelectedDate,
                                  5,
                                  TimeUnit.Days
                              )
                          }
                      )
                  )
              );
              Refresh(Ovos);
              Refresh(Plantel);
              Set(
                  Varreset,
                  true
              );
              Set(
                  Varreset,
                  false
              );
              UpdateContext({ctxGestaoOvoPopUp: false});
            PressedBorderColor: =Self.Fill
            PressedColor: =RGBA(255, 255, 255, 1)
            PressedFill: =Color.Green
            Text: ="Salvar"
            Visible: =ctxGestaoOvoPopUp
            X: =548
            Y: =623

                                  Checkbox1.Value = true,
                                  Today(),
                                  Blank()
                              ),
                              DataPrevistaNascimento: If(
                                  Checkbox1.Value = true,
                              DatePicker1.SelectedDate + Value(
                                      LookUp(
                                          EspecieAve,
                                          Especie = LookUp(
                                              Plantel,
                                              ID = Value(varpaiselecionado.ID),
                                              CategoriaAve
                                          ),
                                          TempoChoco
                                      )
                                  ),
                                  Blank()
                              ),
                              ConfirmaInicioChoco: If(
                                  Checkbox1.Value = true,
                                  "Sim",
                                  "Não"
                              ),
                              Status:If(
                                  Checkbox1.Value = true,
                                  "Chocando",
                                  "Postura"
                              ),
                              NumeroOvo: "Ovo-" & CountRows(
                                  Filter(
                                      Ovos,
                                      Year(Criado) = Year(Now())
                                  )
                              ) + 1 & "-" & Year(Now()),
                              Gaiola: VarChocandoSelecionada.NumeroGaiola,
                              IDGaiola: {
                                  Id: VarChocandoSelecionada.ID,
                                  Value: ""
                              }
                          }
                      )
                  )
              );

<svg width="640" height="640" viewBox="0 0 640 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="640" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2c2520"/>
      <stop offset="0.5" stop-color="#3d302a"/>
      <stop offset="1" stop-color="#4a372e"/>
    </linearGradient>
    <linearGradient id="frame" x1="160" y1="160" x2="480" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4B767"/>
      <stop offset="1" stop-color="#C95025"/>
    </linearGradient>
    <linearGradient id="chest" x1="200" y1="230" x2="380" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4B767"/>
      <stop offset="1" stop-color="#A0401D"/>
    </linearGradient>
    <linearGradient id="wing" x1="290" y1="230" x2="470" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6E9D7A"/>
      <stop offset="1" stop-color="#2D5A46"/>
    </linearGradient>
    <linearGradient id="body" x1="200" y1="190" x2="450" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C2A21"/>
      <stop offset="1" stop-color="#0D1712"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="140" y1="500" x2="500" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4B767"/>
      <stop offset="1" stop-color="#E8A94A"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="320" cy="320" r="320"/>
    </clipPath>
    <radialGradient id="glow" cx="0.3" cy="0.8" r="0.7">
      <stop stop-color="rgba(201,122,80,0.12)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="320" cy="320" r="320" fill="url(#bgGrad)"/>
  <circle cx="320" cy="320" r="320" fill="url(#glow)"/>

  <!-- Subtle ring border -->
  <circle cx="320" cy="320" r="305" fill="none" stroke="rgba(244,183,103,0.15)" stroke-width="2"/>

  <!-- Bird - scaled up from favicon, centered -->
  <g transform="translate(110, 80) scale(6.5)">
    <!-- Arc frame -->
    <path d="M15 36C15 24.9543 23.9543 16 35 16C39.9213 16 44.427 17.7797 47.9095 20.7311" stroke="url(#frame)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M49 29C49 40.0457 40.0457 49 29 49C24.0787 49 19.573 47.2203 16.0905 44.2689" stroke="url(#frame)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M18 40.6C22.8 39.1 25.9 36 28.2 31.9C30.3 28.2 33.1 24.8 38.2 23.4C43.4 22 47.6 24.3 49.6 28.8C51.6 33.5 49.6 38.6 45.1 41.2C40.8 43.7 35.7 44.1 30.6 43.4C25.8 42.8 21.9 42.4 18 40.6Z" fill="url(#body)"/>
    <!-- Tail -->
    <path d="M18.3 40.4C21.3 39.8 24.7 40.4 27.8 42.1C24.6 43.7 20.7 43.6 17.2 42.5C15.9 42.1 15.8 40.9 18.3 40.4Z" fill="#0B140F"/>
    <!-- Chest -->
    <path d="M22.2 38.8C25.8 36.5 27.8 33.4 29.6 29.9C30.9 27.4 33.4 24.9 36.8 23.8C38.1 29.2 36.3 35.8 31.1 40.5C27.8 40.5 24.9 40 22.2 38.8Z" fill="url(#chest)"/>
    <!-- Wing -->
    <path d="M31.5 28.4C35.4 25.1 40.3 24.9 44.3 27C46.8 28.3 47.9 31.6 46.4 34.2C44.2 38 39.4 39.2 34.4 38.5C32.6 35.3 31.7 31.9 31.5 28.4Z" fill="url(#wing)" opacity="0.96"/>
    <!-- Beak -->
    <path d="M45.7 25.9L51 24.7L47.2 28.6Z" fill="#F9E4BE"/>
    <!-- Eye -->
    <circle cx="41.4" cy="27.7" r="1.85" fill="#FFF8F1"/>
    <!-- Lower accent -->
    <path d="M18 45.3C24 43.9 31 44 36.8 46.2" stroke="rgba(246,179,96,0.68)" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- PLUMAR text -->
  <text x="320" y="530" text-anchor="middle" font-family="Georgia, 'DM Serif Display', serif" font-size="62" font-weight="400" fill="url(#textGrad)" letter-spacing="10">PLUMAR</text>
  <text x="320" y="565" text-anchor="middle" font-family="'Segoe UI', 'Inter', sans-serif" font-size="20" fill="rgba(255,255,255,0.45)" letter-spacing="3">GESTAO DE CRIATORIO</text>
</svg>
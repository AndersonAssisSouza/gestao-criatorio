name = "gestao-criatorio-api"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

[vars]
NODE_ENV = "production"
EMAIL_PROVIDER = "supabase_function"

# Secrets (configurar via wrangler secret put ou no dashboard):
# JWT_SECRET
# DATABASE_URL
# DATABASE_SSL
# MERCADOPAGO_ACCESS_TOKEN
# MERCADOPAGO_WEBHOOK_SECRET
# SUPABASE_URL
# SUPABASE_ANON_KEY
# OWNER_EMAIL
# OWNER_NAME
# OWNER_PASSWORD
# OWNER_ACCESS_KEY
# LEADS_API_KEY
# FRONTEND_URL
# FRONTEND_PUBLIC_URL
#
# Meta Graph API (agendamento automatizado de posts):
# META_GRAPH_VERSION          (opcional, default v21.0)
# META_PAGE_ID                (id da Facebook Page — 1146018875251408)
# META_PAGE_ACCESS_TOKEN      (long-lived, renovar a cada 60 dias)
# META_IG_BUSINESS_ID         (id do Instagram Business Account)

# Cron triggers:
#   "0 */12 * * *"  — lembrete de assinatura (a cada 12h)
#   "*/5 * * * *"   — publicação de scheduled_posts via Meta Graph API
[triggers]
crons = ["0 */12 * * *", "*/5 * * * *"]

# Custom domain api.plumar.com.br configurado via Cloudflare dashboard
# (Workers > Custom Domains) para evitar erro de autenticacao com routes

databases:
  - name: gestao-criatorio-db
    plan: free
    databaseName: gestao_criatorio
    user: plumar

services:
  - type: web
    name: gestao-criatorio-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: gestao-criatorio-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: FRONTEND_URL
        value: https://andersonassissouza.github.io
      - key: FRONTEND_PUBLIC_URL
        value: https://andersonassissouza.github.io/gestao-criatorio
      - key: PAYMENT_PROVIDER
        value: mercadopago
      - key: MERCADOPAGO_STATEMENT_DESCRIPTOR
        value: PLUMAR
      - key: BACKEND_PUBLIC_URL
        fromService:
          name: gestao-criatorio-api
          type: web
          property: url
      # Secrets — adicionar manualmente no painel Render:
      - key: JWT_SECRET
        generateValue: true
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_WEBHOOK_SECRET
        sync: false
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: SHAREPOINT_SITE_URL
        sync: false

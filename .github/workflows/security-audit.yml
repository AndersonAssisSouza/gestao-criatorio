name: Security Audit

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit backend (prod deps)
        working-directory: backend
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high --omit=dev

      - name: Audit frontend (prod deps)
        working-directory: frontend
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high --omit=dev

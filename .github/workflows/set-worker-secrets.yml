name: Configure Worker Secrets

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    name: Apply secrets to Cloudflare Worker
    steps:
      - uses: actions/checkout@v6

      - name: Install backend deps
        working-directory: backend
        run: npm ci || npm install

      - name: Set JWT_SECRET
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_JWT_SECRET }}
        run: echo "$VALUE" | npx wrangler secret put JWT_SECRET

      - name: Set DATABASE_URL
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_DATABASE_URL }}
        run: echo "$VALUE" | npx wrangler secret put DATABASE_URL

      - name: Set DATABASE_SSL
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: echo "true" | npx wrangler secret put DATABASE_SSL

      - name: Set OWNER_EMAIL
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_OWNER_EMAIL }}
        run: echo "$VALUE" | npx wrangler secret put OWNER_EMAIL

      - name: Set OWNER_PASSWORD
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_OWNER_PASSWORD }}
        run: echo "$VALUE" | npx wrangler secret put OWNER_PASSWORD

      - name: Set OWNER_NAME
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_OWNER_NAME }}
        run: echo "$VALUE" | npx wrangler secret put OWNER_NAME

      - name: Set OWNER_ACCESS_KEY
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_OWNER_ACCESS_KEY }}
        run: echo "$VALUE" | npx wrangler secret put OWNER_ACCESS_KEY

      - name: Set MERCADOPAGO_ACCESS_TOKEN
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_MERCADOPAGO_ACCESS_TOKEN }}
        run: echo "$VALUE" | npx wrangler secret put MERCADOPAGO_ACCESS_TOKEN

      - name: Set MERCADOPAGO_WEBHOOK_SECRET
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_MERCADOPAGO_WEBHOOK_SECRET }}
        run: |
          if [ -n "$VALUE" ]; then
            echo "$VALUE" | npx wrangler secret put MERCADOPAGO_WEBHOOK_SECRET
          else
            echo "MERCADOPAGO_WEBHOOK_SECRET vazio no GitHub Secrets — pulando (webhook rodara em modo observe)"
          fi

      - name: Set FRONTEND_URL
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_FRONTEND_URL }}
        run: echo "$VALUE" | npx wrangler secret put FRONTEND_URL

      - name: Set FRONTEND_PUBLIC_URL
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_FRONTEND_PUBLIC_URL }}
        run: echo "$VALUE" | npx wrangler secret put FRONTEND_PUBLIC_URL

      - name: Set BACKEND_PUBLIC_URL
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_BACKEND_PUBLIC_URL }}
        run: echo "$VALUE" | npx wrangler secret put BACKEND_PUBLIC_URL

      - name: Set SUPABASE_URL
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_SUPABASE_URL }}
        run: echo "$VALUE" | npx wrangler secret put SUPABASE_URL

      - name: Set SUPABASE_ANON_KEY
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VALUE: ${{ secrets.WORKER_SUPABASE_ANON_KEY }}
        run: echo "$VALUE" | npx wrangler secret put SUPABASE_ANON_KEY

      # EMAIL_PROVIDER fica em [vars] do wrangler.toml — nao pode ser secret
      # (erro 10053: Binding name already in use).

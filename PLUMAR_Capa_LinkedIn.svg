    <text x="780" y="285" text-anchor="middle" fill="rgba(244,183,103,0.65)" font-size="12" letter-spacing="1.5">PLANTEL</text>

    <rect x="858" y="265" width="120" height="30" rx="15" fill="rgba(201,122,80,0.12)" stroke="rgba(201,122,80,0.2)" stroke-width="1"/>
    <text x="918" y="285" text-anchor="middle" fill="rgba(244,183,103,0.65)" font-size="12" letter-spacing="1.5">GENETICA</text>


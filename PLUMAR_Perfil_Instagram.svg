<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2c2520" />
      <stop offset="1" stop-color="#3d302a" />
    </linearGradient>
    <linearGradient id="frame" x1="120" y1="80" x2="280" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4B767" />
      <stop offset="1" stop-color="#C95025" />
    </linearGradient>
    <linearGradient id="chest" x1="140" y1="110" x2="220" y2="220" gradientUnits="userSpaceOnUse">

    <linearGradient id="wing" x1="180" y1="110" x2="270" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6E9D7A" />
      <stop offset="1" stop-color="#2D5A46" />
    </linearGradient>
    <linearGradient id="body" x1="135" y1="100" x2="265" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C2A21" />
      <stop offset="1" stop-color="#0D1712" />
    </linearGradient>
  </defs>

  <!-- Background -->
